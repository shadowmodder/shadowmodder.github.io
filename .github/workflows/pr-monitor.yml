name: PR CI Monitor

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:       # manual trigger from Actions tab

permissions:
  contents: write
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install "ruff==0.15.3" --quiet

      - name: Monitor PRs and auto-fix lint
        env:
          GH_TOKEN: ${{ secrets.FORK_PAT || github.token }}
          FORK_PAT: ${{ secrets.FORK_PAT }}
        run: python scripts/monitor_prs.py

      - name: Post status issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f /tmp/pr_status.md ]; then
            # Find existing open monitor issue
            ISSUE_NUM=$(gh issue list --repo shadowmodder/shadowmodder.github.io \
              --label "pr-monitor" --state open --json number -q '.[0].number' 2>/dev/null || echo "")
            if [ -z "$ISSUE_NUM" ]; then
              gh issue create --repo shadowmodder/shadowmodder.github.io \
                --title "PR CI Status" \
                --label "pr-monitor" \
                --body-file /tmp/pr_status.md
            else
              gh issue edit "$ISSUE_NUM" --repo shadowmodder/shadowmodder.github.io \
                --body-file /tmp/pr_status.md
            fi
          fi
